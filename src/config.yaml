site:
  name: 'Triaxis'
  site: 'https://astrowind-olive-two.vercel.app'
  base: '/'
  trailingSlash: false
  googleSiteVerificationId: false

metadata:
  title:
    default: 'Triaxis — Consultoria em Engenharia Ambiental, Produção e Segurança'
    template: '%s — Triaxis'
  description: 'Consultoria especializada em Meio Ambiente, Engenharia de Produção e Segurança do Trabalho para empresas que buscam conformidade legal e crescimento sustentável.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 'Triaxis Consultoria'
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website

i18n:
  language: pt-BR
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6
    post:
      isEnabled: true
      permalink: '/blog/%slug%'
      robots:
        index: true
    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true
    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true
    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false
    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'light'
